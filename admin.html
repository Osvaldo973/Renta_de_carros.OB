<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Flota | Fuertes Rent-Car (Versión GitHub)</title>
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos Locales -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="padding-top: 80px;">

    <!-- Navbar Minimalista Admin -->
    <nav class="navbar scrolled">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-car-side" style="color: var(--primary);"></i>
            <span>Fuertes <span class="gradient-text">Rent-Car</span> <small style="font-size: 0.6rem; opacity: 0.5;">STATIC</small></span>
        </a>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span id="user-name" style="color: var(--text-med); font-size: 0.9rem; font-weight: 600;"></span>
            <button onclick="logout()" class="btn btn-outline" style="padding: 8px 15px; font-size: 0.8rem; border-color: rgba(244, 63, 94, 0.3); color: var(--accent);">
                SALIR <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </nav>

    <main style="padding: 40px 8%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <div>
                <h1 style="font-size: 2.5rem; font-weight: 800;" class="gradient-text">Gestión de Vehículos</h1>
                <p style="color: var(--text-med);">Control total de la flota almacenada en el navegador.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> AGREGAR VEHÍCULO
            </button>
        </div>

        <!-- Tabla de Gestión -->
        <div class="glass" style="border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border);">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid var(--glass-border);">
                        <th style="padding: 20px;">Vehículo</th>
                        <th style="padding: 20px;">Categoría</th>
                        <th style="padding: 20px;">Precio/Día</th>
                        <th style="padding: 20px;">Estado</th>
                        <th style="padding: 20px; text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="vehicle-table-body">
                    <!-- Se carga dinámicamente -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal para Agregar/Editar -->
    <div id="vehicle-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px);">
        <div class="glass" style="width: 90%; max-width: 700px; padding: 40px; border-radius: 30px; position: relative; max-height: 90vh; overflow-y: auto;">
            <span style="position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: var(--text-low);" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="margin-bottom: 30px; font-size: 2rem;" class="gradient-text">Agregar Vehículo</h2>
            
            <form id="vehicle-form">
                <input type="hidden" id="vehicle-id">
                
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group">
                        <label>Modelo</label>
                        <input type="text" id="modelo" class="form-input" required placeholder="Ej. Toyota Land Cruiser">
                    </div>
                    <div class="form-group">
                        <label>Año</label>
                        <input type="number" id="año" class="form-input" required placeholder="2024">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group">
                        <label>Categoría</label>
                        <input type="text" id="categoria" class="form-input" required placeholder="Ej. SUV Luxury">
                    </div>
                    <div class="form-group">
                        <label>Precio por Día (RD$)</label>
                        <input type="number" id="precio_dia" class="form-input" required placeholder="5000">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Estado</label>
                    <select id="estado" class="form-input" style="background: rgba(15, 15, 20, 0.9);">
                        <option value="disponible">Disponible</option>
                        <option value="alquilado">Alquilado</option>
                        <option value="mantenimiento">Mantenimiento</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Imagen del Vehículo</label>
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <label for="image-upload" class="btn btn-outline" style="flex: 1; margin: 0; cursor: pointer; padding: 12px;">
                            <i class="fa-solid fa-image"></i> SELECCIONAR IMAGEN
                        </label>
                        <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="handleImagePreview(this)">
                        <input type="hidden" id="image-url">
                        <div id="image-preview" style="width: 60px; height: 60px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; overflow: hidden;">
                            <i class="fa-solid fa-camera" style="color: var(--text-low); font-size: 1.2rem;"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="descripcion" class="form-input" rows="3" placeholder="Detalles sobre el equipamiento, confort, etc."></textarea>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal()">CANCELAR</button>
                    <button type="submit" class="btn btn-primary" style="flex: 2;">GUARDAR VEHÍCULO</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script>
        // Check Auth
        if (!checkAuth()) { window.location.href = 'login.html'; }

        document.addEventListener('DOMContentLoaded', () => {
            const session = getSession();
            document.getElementById('user-name').textContent = session.fullname;
            loadVehicles();
        });

        function loadVehicles() {
            const vehicles = getVehicles();
            const tableBody = document.getElementById('vehicle-table-body');
            tableBody.innerHTML = '';

            vehicles.forEach(v => {
                const img = (Array.isArray(v.imagen_url) && v.imagen_url.length > 0) ? v.imagen_url[0] : 'https://via.placeholder.com/100x60?text=Auto';
                const statusClass = v.estado === 'disponible' ? 'status-pill-success' : (v.estado === 'alquilado' ? 'status-pill-warning' : 'status-pill-error');
                const row = `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                        <td style="padding: 20px;">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <img src="${img}" style="width: 80px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid var(--glass-border);">
                                <div>
                                    <div style="font-weight: 700; color: white;">${v.modelo}</div>
                                    <div style="font-size: 0.8rem; color: var(--text-low);">${v.año}</div>
                                </div>
                            </div>
                        </td>
                        <td style="padding: 20px; color: var(--text-med); font-size: 0.9rem;">${v.categoria}</td>
                        <td style="padding: 20px; font-weight: 700; color: var(--primary);">RD$${v.precio_dia}</td>
                        <td style="padding: 20px;">
                            <span class="status-pill ${statusClass}" style="text-transform: capitalize;">${v.estado}</span>
                        </td>
                        <td style="padding: 20px; text-align: center;">
                            <div style="display: flex; gap: 10px; justify-content: center;">
                                <button class="btn btn-outline" style="padding: 8px; font-size: 0.9rem; min-width: 40px;" onclick='editVehicle(${JSON.stringify(v)})' title="Editar">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button class="btn btn-outline" style="padding: 8px; font-size: 0.9rem; min-width: 40px; color: var(--accent); border-color: rgba(244, 63, 94, 0.2);" onclick="handleDelete(${v.id})" title="Eliminar">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        function openModal() {
            document.getElementById('modal-title').textContent = "Agregar Vehículo";
            document.getElementById('vehicle-form').reset();
            document.getElementById('vehicle-id').value = "";
            document.getElementById('image-preview').innerHTML = '<i class="fa-solid fa-camera" style="color: var(--text-low); font-size: 1.2rem;"></i>';
            document.getElementById('vehicle-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('vehicle-modal').style.display = 'none';
        }

        async function handleImagePreview(input) {
            if (input.files && input.files[0]) {
                const response = await uploadImageLocal(input.files[0]);
                if (response.status === 'success') {
                    document.getElementById('image-url').value = response.url;
                    document.getElementById('image-preview').innerHTML = `<img src="${response.url}" style="width:100%; height:100%; object-fit:cover;">`;
                }
            }
        }

        function editVehicle(v) {
            document.getElementById('modal-title').textContent = "Editar Vehículo";
            document.getElementById('vehicle-id').value = v.id;
            document.getElementById('modelo').value = v.modelo;
            document.getElementById('año').value = v.año;
            document.getElementById('categoria').value = v.categoria;
            document.getElementById('precio_dia').value = v.precio_dia;
            document.getElementById('estado').value = v.estado;
            document.getElementById('descripcion').value = v.descripcion || "";
            
            const img = (Array.isArray(v.imagen_url) && v.imagen_url.length > 0) ? v.imagen_url[0] : '';
            document.getElementById('image-url').value = img;
            if (img) {
                document.getElementById('image-preview').innerHTML = `<img src="${img}" style="width:100%; height:100%; object-fit:cover;">`;
            } else {
                document.getElementById('image-preview').innerHTML = '<i class="fa-solid fa-camera" style="color: var(--text-low); font-size: 1.2rem;"></i>';
            }
            
            document.getElementById('vehicle-modal').style.display = 'flex';
        }

        document.getElementById('vehicle-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const vehicle = {
                id: document.getElementById('vehicle-id').value,
                modelo: document.getElementById('modelo').value,
                año: document.getElementById('año').value,
                categoria: document.getElementById('categoria').value,
                precio_dia: document.getElementById('precio_dia').value,
                estado: document.getElementById('estado').value,
                descripcion: document.getElementById('descripcion').value,
                imagen_url: [document.getElementById('image-url').value]
            };

            saveVehicle(vehicle);
            closeModal();
            loadVehicles();
        });

        function handleDelete(id) {
            if (confirm('¿Estás seguro de que deseas eliminar este vehículo?')) {
                deleteVehicle(id);
                loadVehicles();
            }
        }
    </script>
    
    <style>
        .status-pill { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
        .status-pill-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-pill-warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
        .status-pill-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</body>
</html>
