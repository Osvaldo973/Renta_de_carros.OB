<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Fuertes Rent-Car</title>
    <!-- Fuentes Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos Locales -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .admin-table th, .admin-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .admin-table th {
            color: var(--secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .admin-table td {
            font-size: 0.9rem;
        }
        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-disponible { background: rgba(39, 174, 96, 0.2); color: #2ecc71; }
        .status-alquilado { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .status-mantenimiento { background: rgba(241, 196, 15, 0.2); color: #f1c40f; }
        .edit-btn {
            background: none;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            font-size: 1rem;
            margin-right: 10px;
        }
        .delete-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <nav style="background: var(--primary); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--secondary);">
        <a href="admin.html" class="neon-logo" style="line-height:1; display:flex; align-items:center; text-decoration:none; color:#fff;">
            <span class="fa-layers fa-fw" style="margin-right:10px; font-size:2rem; display:inline-block;">
                <i class="fa-solid fa-shield" style="color: var(--accent);"></i>
                <i class="fa-solid fa-car-side" data-fa-transform="shrink-6" style="color: #fff;"></i>
            </span>
            <div>FUERTES<br><span style="font-size:0.8rem; letter-spacing: 2px;">ADMIN <span style="color:var(--secondary); font-size:0.6rem;">(GitHub)</span></span></div>
        </a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Ver Sitio Público</a>
            <button onclick="logout()" class="btn btn-primary" style="padding: 5px 15px; font-size: 0.8rem;">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>Gestión de Vehículos</h2>
            <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Nuevo Vehículo</button>
        </div>

        <div style="background: var(--card-bg); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Vehículo</th>
                        <th>Año</th>
                        <th>Precio/Día</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="admin-tbody">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal de Edición -->
    <div id="modal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; overflow-y: auto; padding: 20px;">
        <div class="login-card" style="margin:auto; width: 500px; max-width: 100%; background: var(--bg);">
            <h3 id="modal-title">Editar Vehículo</h3>
            <form id="edit-form" style="margin-top:20px;">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Modelo</label>
                    <input type="text" id="edit-modelo" class="form-control" required placeholder="Ej. Honda CR-V">
                </div>
                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1;">
                        <label>Año</label>
                        <input type="number" id="edit-año" class="form-control" required placeholder="2023">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Precio (RD$)</label>
                        <input type="number" id="edit-precio" class="form-control" required placeholder="4500">
                    </div>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="edit-estado" class="form-control">
                        <option value="disponible">Disponible</option>
                        <option value="alquilado">Alquilado</option>
                        <option value="mantenimiento">Mantenimiento</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="edit-desc" class="form-control" rows="3" placeholder="Descripción breve del vehículo..."></textarea>
                </div>
                <div class="form-group">
                    <label>Imágenes (Base64 o URLs)</label>
                    <div id="image-inputs" style="display:flex; flex-direction:column; gap:10px;">
                        <!-- Dinámico -->
                    </div>
                    <button type="button" class="btn" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; margin-top:10px; padding:8px 15px; font-size:0.8rem;" onclick="addImageInput()">+ Añadir Imagen</button>
                    <p style="font-size:0.7rem; color:var(--text-muted); margin-top:5px;"><i class="fa-solid fa-circle-info"></i> Nota: Las imágenes pesadas pueden llenar el almacenamiento local del navegador.</p>
                </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button type="button" class="btn" style="background:#222; border:1px solid #444; color:#fff; flex:1;" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;">GUARDAR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Input oculto para subir archivos -->
    <input type="file" id="file-helper" style="display:none;" accept="image/*">

    <script src="js/storage.js"></script>
    <script>
        // Proteger ruta
        if (!checkAuth()) { /* Redirecciona automáticamente desde storage.js */ }

        function loadVehicles() {
            const data = getVehicles();
            const tbody = document.getElementById('admin-tbody');
            tbody.innerHTML = '';
            
            data.forEach(v => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <img src="${(Array.isArray(v.imagen_url) && v.imagen_url.length > 0) ? v.imagen_url[0] : 'https://via.placeholder.com/50x35?text=Auto'}" style="width:50px; height:35px; border-radius:5px; object-fit:cover;" onerror="this.onerror=null; this.src='https://via.placeholder.com/50x35?text=Auto'">
                            <strong>${v.modelo}</strong>
                        </div>
                    </td>
                    <td>${v.año}</td>
                    <td>RD$${v.precio_dia}</td>
                    <td><span class="status-pill status-${v.estado}">${v.estado}</span></td>
                    <td>
                        <button class="edit-btn" title="Editar"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="delete-btn" onclick="confirmDelete(${v.id})" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                // Asignar el click directamente para evitar problemas con JSON.stringify en atributos
                tr.querySelector('.edit-btn').onclick = () => editVehicle(v);
                tbody.appendChild(tr);
            });
        }

        function addImageInput(val = '') {
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.gap = '10px';
            div.style.alignItems = 'center';
            div.innerHTML = `
                <input type="text" class="form-control img-input" value="${val}" placeholder="URL o Base64" style="flex:1;">
                <button type="button" class="btn" style="background:#3b82f6; color:white; padding:0; width:40px; height:40px; display:flex; justify-content:center; align-items:center; border-radius:10px;" onclick="triggerUpload(this)" title="Subir desde PC">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </button>
                <button type="button" class="btn" style="background:var(--accent); color:white; padding:0; width:40px; height:40px; display:flex; justify-content:center; align-items:center; border-radius:10px;" onclick="this.parentElement.remove()" title="Eliminar">
                    <i class="fa-solid fa-trash"></i>
                </button>
            `;
            document.getElementById('image-inputs').appendChild(div);
        }

        async function triggerUpload(btn) {
            const fileInput = document.getElementById('file-helper');
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const icon = btn.querySelector('i');
                icon.className = 'fa-solid fa-spinner fa-spin';
                btn.disabled = true;
                
                try {
                    const result = await uploadImageLocal(file);
                    btn.parentElement.querySelector('.img-input').value = result.url;
                } catch (err) {
                    alert('Error al procesar la imagen.');
                    console.error(err);
                } finally {
                    icon.className = 'fa-solid fa-cloud-arrow-up';
                    btn.disabled = false;
                    fileInput.value = '';
                }
            };
            fileInput.click();
        }

        function editVehicle(v) {
            document.getElementById('modal-title').textContent = 'Editar Vehículo';
            document.getElementById('edit-id').value = v.id;
            document.getElementById('edit-modelo').value = v.modelo;
            document.getElementById('edit-año').value = v.año;
            document.getElementById('edit-precio').value = v.precio_dia;
            document.getElementById('edit-estado').value = v.estado;
            document.getElementById('edit-desc').value = v.descripcion || '';
            
            document.getElementById('image-inputs').innerHTML = '';
            if (Array.isArray(v.imagen_url) && v.imagen_url.length > 0) {
                v.imagen_url.forEach(url => addImageInput(url));
            } else {
                addImageInput('');
            }
            
            document.getElementById('modal').style.display = 'flex';
        }

        function openModal() {
             document.getElementById('modal-title').textContent = 'Nuevo Vehículo';
             document.getElementById('edit-form').reset();
             document.getElementById('edit-id').value = '';
             document.getElementById('image-inputs').innerHTML = '';
             addImageInput('');
             document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        document.getElementById('edit-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const imageInputs = document.querySelectorAll('.img-input');
            const imagen_url = Array.from(imageInputs).map(inp => inp.value).filter(val => val.trim() !== '');

            const vehicleData = {
                id: id || null,
                modelo: document.getElementById('edit-modelo').value,
                año: document.getElementById('edit-año').value,
                precio_dia: document.getElementById('edit-precio').value,
                estado: document.getElementById('edit-estado').value,
                descripcion: document.getElementById('edit-desc').value,
                imagen_url: imagen_url,
                categoria: 'SUV' // Por simplificación
            };

            saveVehicle(vehicleData);
            closeModal();
            loadVehicles();
        });

        function confirmDelete(id) {
            if (confirm('¿Estás seguro de que deseas eliminar este vehículo?')) {
                deleteVehicle(id);
                loadVehicles();
            }
        }

        loadVehicles();
    </script>
</body>
</html>
