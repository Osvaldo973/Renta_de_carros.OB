<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin | Fuertes Rent-Car (Versión GitHub)</title>
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos Locales -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="background: radial-gradient(circle at top right, #1e1b4b, #0a0a0c); height: 100vh; overflow: hidden;">

    <div class="auth-wrapper">
        <div class="glass auth-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                    <i class="fa-solid fa-car-side" style="color: var(--primary);"></i>
                </a>
                <h2 style="margin-top: 15px; font-weight: 800;" class="gradient-text">ADMIN PANEL</h2>
                <p style="color: var(--text-med); font-size: 0.9rem; margin-top: 5px;">Versión Estática (localStorage)</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" class="form-input" required placeholder="admin" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 15px;">
                    ACCEDER <i class="fa-solid fa-arrow-right"></i>
                </button>
                <p id="error-msg" style="color: var(--accent); font-size: 0.85rem; margin-top: 20px; text-align: center; display: none; padding: 10px; background: rgba(244, 63, 94, 0.1); border-radius: 8px; border: 1px solid rgba(244, 63, 94, 0.2);"></p>
            </form>

            <div style="text-align: center; margin-top: 30px;">
                <a href="index.html" style="color: var(--text-low); text-decoration: none; font-size: 0.85rem; transition: var(--transition-smooth);" onmouseover="this.style.color='var(--text-high)'" onmouseout="this.style.color='var(--text-low)'">
                    <i class="fa-solid fa-chevron-left"></i> Volver al sitio público
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = e.target.querySelector('button');

            // Visual feedback
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> AUTENTICANDO...';

            // Simulación de delay
            setTimeout(() => {
                const response = login(username, password);
                if (response.status === 'success') {
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.textContent = response.message;
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'ACCEDER <i class="fa-solid fa-arrow-right"></i>';
                }
            }, 600);
        });
    </script>
</body>
</html>
