<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin - Fuertes Rent-Car</title>
    <!-- Fuentes Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos Locales -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="background: radial-gradient(circle at top right, #1a1a1a, #000);">

    <div class="login-card">
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="index.html" class="neon-logo" style="line-height:1; font-size:2rem; display:flex; flex-direction:column; align-items:center; gap:10px;">
                <span class="fa-layers fa-fw" style="font-size:4rem;">
                    <i class="fa-solid fa-shield" style="color: var(--accent);"></i>
                    <i class="fa-solid fa-car-side" data-fa-transform="shrink-6" style="color: var(--text);"></i>
                </span>
                <div>FUERTES<br><span style="font-size:1.2rem; letter-spacing: 2px;">RENT-CAR</span></div>
            </a>
        </div>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">Panel Administrativo (Versión GitHub)</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" class="form-control" required placeholder="admin">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" required placeholder="admin123">
            </div>
            <button type="submit" class="btn btn-primary w-100" style="width: 100%; margin-top: 20px;">ENTRAR</button>
            <p id="error-msg" style="color: var(--accent); font-size: 0.8rem; margin-top: 15px; text-align: center; display: none;"></p>
        </form>
    </div>

    <script src="js/storage.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            const result = login(username, password);
            if (result.status === 'success') {
                window.location.href = 'admin.html';
            } else {
                errorMsg.textContent = result.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
